name: Test

on:
  workflow_call:

jobs:
  discover-tests:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover test projects
        id: discover
        shell: pwsh
        run: |
          $projects = @(
            Get-ChildItem -Path . -Recurse -Filter *.csproj |
              Where-Object { Select-String -Path $_.FullName -Pattern 'Microsoft.NET.Test.Sdk' -Quiet } |
              Sort-Object FullName |
              ForEach-Object {
                $relativePath = Resolve-Path -Path $_.FullName -Relative
                $relativePath = $relativePath -replace '^[.][\\/]', ''

                [pscustomobject]@{
                  name = [IO.Path]::GetFileNameWithoutExtension($_.Name)
                  project = $relativePath -replace '\\', '/'
                }
              }
          )

          if ($projects.Count -eq 0) {
            throw 'No test projects found.'
          }

          $matrix = @{ include = $projects } | ConvertTo-Json -Compress -Depth 4
          "matrix=$matrix" >> $env:GITHUB_OUTPUT
          $matrix

  test:
    name: Test ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: discover-tests
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-tests.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker
        run: |
          sudo systemctl start docker
          docker info

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4.2.3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ${{ matrix.project }}

      - name: Test
        run: dotnet test ${{ matrix.project }} --no-restore --verbosity normal --collect:"XPlat Code Coverage"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.name }}
          path: '**/TestResults/**/coverage.cobertura.xml'
          if-no-files-found: error
