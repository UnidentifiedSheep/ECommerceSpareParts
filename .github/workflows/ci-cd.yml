name: CI-CD

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker
        run: |
          sudo systemctl start docker
          docker info

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4.2.3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ECommerceSpareParts.sln

      - name: Build
        run: dotnet build ECommerceSpareParts.sln --no-restore

      - name: Test
        run: dotnet test ECommerceSpareParts.sln --no-build --verbosity normal

  deploy:
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Migrator images
        run: docker compose -f migrator-compose.yaml build

      - name: Build Apps images
        run: docker compose -f compose.yaml --env-file .env.example build

      - name: Save all images
        run: |
          echo "=== Collect images ==="
      
          MIGRATOR_IMAGES=$(docker compose -f migrator-compose.yaml config --images)
          APP_IMAGES=$(docker compose -f compose.yaml --env-file .env.example config --images)
      
          ALL_IMAGES="$MIGRATOR_IMAGES $APP_IMAGES"
      
          echo "Images:"
          echo $ALL_IMAGES
      
          if [ -z "$ALL_IMAGES" ]; then
            echo "No images found!"
            exit 1
          fi
      
          echo "=== Saving images ==="
          docker save $ALL_IMAGES -o images.tag | gzip > images.tar.gz
      
          ls -lh images.tar.gz
          
      - name: Copy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "compose.yaml,migrator-compose.yaml,images.tar.gz"
          target: ${{ secrets.VPS_PATH }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd ${{ secrets.VPS_PATH }}

            echo "=== Load images ==="
            gunzip -c images.tar.gz | docker load

            echo "=== Run migrators ==="
            docker compose -f migrator-compose.yaml up --abort-on-container-exit

            echo "=== Restart API ==="
            docker compose -f compose.yaml up -d --force-recreate

            echo "=== Done ==="
