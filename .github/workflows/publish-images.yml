name: Publish Images

on:
  workflow_call:
    secrets:
      ARTIFACT_REGISTRY_HOST:
        required: true
      ARTIFACT_REGISTRY_USERNAME:
        required: true
      ARTIFACT_REGISTRY_PASSWORD:
        required: true

jobs:
  discover-images:
    runs-on: ubuntu-latest

    env:
      ARTIFACT_REGISTRY_HOST: ${{ secrets.ARTIFACT_REGISTRY_HOST }}
      IMAGE_TAG: ${{ github.sha }}

    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover Docker services
        id: discover
        run: |
          discover_services() {
            docker compose "$@" --env-file .env.example config --format json \
              | python3 -c '
          import json
          import os
          import sys

          data = json.load(sys.stdin)
          workspace = os.getcwd()
          result = []

          def normalize_path(value):
              if not value:
                  return value
              if os.path.isabs(value):
                  return os.path.relpath(value, workspace)
              return value

          for name, service in data["services"].items():
              build = service.get("build")
              if build is None:
                  continue

              image = service.get("image") or (build.get("tags") or [""])[0]
              image_name = image.split("/")[-1].split(":")[0]

              result.append({
                  "service": name,
                  "image": image_name,
                  "context": normalize_path(build.get("context") or "."),
                  "dockerfile": normalize_path(build.get("dockerfile") or "Dockerfile")
              })

          print(json.dumps(result))
          '
          }

          APP_SERVICES=$(discover_services -f compose.yaml -f compose.registry.yaml)
          MIGRATOR_SERVICES=$(discover_services -f migrator-compose.yaml -f migrator-compose.registry.yaml)

          MATRIX=$(APP_SERVICES="$APP_SERVICES" MIGRATOR_SERVICES="$MIGRATOR_SERVICES" python3 -c 'import json, os; print(json.dumps({
              "include": json.loads(os.environ["APP_SERVICES"]) + json.loads(os.environ["MIGRATOR_SERVICES"])
            }))')

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "$MATRIX"

  publish-images:
    runs-on: ubuntu-latest
    needs: discover-images
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-images.outputs.matrix) }}

    env:
      ARTIFACT_REGISTRY_HOST: ${{ secrets.ARTIFACT_REGISTRY_HOST }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ARTIFACT_REGISTRY_HOST }}
          username: ${{ secrets.ARTIFACT_REGISTRY_USERNAME }}
          password: ${{ secrets.ARTIFACT_REGISTRY_PASSWORD }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          provenance: false
          sbom: false
          tags: ${{ secrets.ARTIFACT_REGISTRY_HOST }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.ARTIFACT_REGISTRY_HOST }}/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ secrets.ARTIFACT_REGISTRY_HOST }}/${{ matrix.image }}:buildcache,mode=min
