name: Publish Images

on:
  workflow_call:
    secrets:
      ARTIFACT_REGISTRY_HOST:
        required: true
      ARTIFACT_REGISTRY_USERNAME:
        required: true
      ARTIFACT_REGISTRY_PASSWORD:
        required: true

jobs:
  discover-images:
    runs-on: ubuntu-latest

    env:
      ARTIFACT_REGISTRY_HOST: ${{ secrets.ARTIFACT_REGISTRY_HOST }}
      IMAGE_TAG: ${{ github.sha }}

    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover Docker services
        id: discover
        run: |
          APP_SERVICES=$(docker compose -f compose.yaml -f compose.registry.yaml --env-file .env.example config --format json \
            | python3 -c 'import json, sys; data = json.load(sys.stdin); print(json.dumps([
                {"service": name, "compose_files": "compose.yaml compose.registry.yaml"}
                for name, service in data["services"].items()
                if service.get("build") is not None
              ]))')

          MIGRATOR_SERVICES=$(docker compose -f migrator-compose.yaml -f migrator-compose.registry.yaml --env-file .env.example config --format json \
            | python3 -c 'import json, sys; data = json.load(sys.stdin); print(json.dumps([
                {"service": name, "compose_files": "migrator-compose.yaml migrator-compose.registry.yaml"}
                for name, service in data["services"].items()
                if service.get("build") is not None
              ]))')

          MATRIX=$(APP_SERVICES="$APP_SERVICES" MIGRATOR_SERVICES="$MIGRATOR_SERVICES" python3 -c 'import json, os; print(json.dumps({
              "include": json.loads(os.environ["APP_SERVICES"]) + json.loads(os.environ["MIGRATOR_SERVICES"])
            }))')

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "$MATRIX"

  publish-images:
    runs-on: ubuntu-latest
    needs: discover-images
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-images.outputs.matrix) }}

    env:
      ARTIFACT_REGISTRY_HOST: ${{ secrets.ARTIFACT_REGISTRY_HOST }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ARTIFACT_REGISTRY_HOST }}
          username: ${{ secrets.ARTIFACT_REGISTRY_USERNAME }}
          password: ${{ secrets.ARTIFACT_REGISTRY_PASSWORD }}

      - name: Build and push ${{ matrix.service }}
        run: |
          COMPOSE_ARGS=()
          for file in ${{ matrix.compose_files }}; do
            COMPOSE_ARGS+=("-f" "$file")
          done

          docker compose "${COMPOSE_ARGS[@]}" --env-file .env.example build ${{ matrix.service }}
          docker compose "${COMPOSE_ARGS[@]}" --env-file .env.example push ${{ matrix.service }}
