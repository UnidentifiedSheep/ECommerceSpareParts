name: Publish Images

on:
  workflow_call:
    secrets:
      ARTIFACT_REGISTRY_HOST:
        required: true
      ARTIFACT_REGISTRY_USERNAME:
        required: true
      ARTIFACT_REGISTRY_PASSWORD:
        required: true

jobs:
  publish-images:
    runs-on: ubuntu-latest

    env:
      ARTIFACT_REGISTRY_HOST: ${{ secrets.ARTIFACT_REGISTRY_HOST }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ARTIFACT_REGISTRY_HOST }}
          username: ${{ secrets.ARTIFACT_REGISTRY_USERNAME }}
          password: ${{ secrets.ARTIFACT_REGISTRY_PASSWORD }}

      - name: Build app images
        run: docker compose -f compose.yaml -f compose.registry.yaml --env-file .env.example build --push

      - name: Push app images
        run: |
          SERVICES=$(docker compose -f compose.yaml -f compose.registry.yaml --env-file .env.example config --format json \
            | jq -r '.services | to_entries[] | select(.value.build != null) | .key')
          docker compose -f compose.yaml -f compose.registry.yaml --env-file .env.example push $SERVICES

      - name: Build migrator images
        run: docker compose -f migrator-compose.yaml -f migrator-compose.registry.yaml --env-file .env.example build --push

      - name: Push migrator images
        run: docker compose -f migrator-compose.yaml -f migrator-compose.registry.yaml --env-file .env.example push
