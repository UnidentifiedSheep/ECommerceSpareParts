name: Deploy

on:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SWARM_PATH: ${{ secrets.SWARM_PATH || '/opt/ecommerce' }}
      STACK_NAME: ${{ secrets.SWARM_STACK_NAME || 'ecommerce' }}
      DEPLOY_ENVIRONMENT: ${{ vars.DEPLOY_ENVIRONMENT || 'Production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deploy payload
        run: |
          mkdir -p deploy-payload/deploy deploy-payload/init deploy-payload/scripts/deploy

          cp deploy/stack.*.yml deploy-payload/deploy/
          cp prometheus.yml deploy-payload/prometheus.yml
          cp scripts/deploy/deploy-swarm.sh deploy-payload/scripts/deploy/deploy-swarm.sh
          cp scripts/deploy/load-secrets.py deploy-payload/scripts/deploy/load-secrets.py
          cp -R init/. deploy-payload/init/

      - name: Prepare leader directory
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SWARM_LEADER_HOST }}
          username: ${{ secrets.SWARM_SSH_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          script: |
            set -e

            mkdir -p '${{ env.SWARM_PATH }}'
            cd '${{ env.SWARM_PATH }}'

            rm -rf release configs.next configs.old
            mkdir -p release configs

      - name: Upload stack files to leader
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SWARM_LEADER_HOST }}
          username: ${{ secrets.SWARM_SSH_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          source: "deploy-payload/*"
          target: ${{ env.SWARM_PATH }}/release
          strip_components: 1
          overwrite: true

      - name: Activate leader payload
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SWARM_LEADER_HOST }}
          username: ${{ secrets.SWARM_SSH_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          script: |
            set -e

            cd '${{ env.SWARM_PATH }}'

            rm -rf init
            mv release/init init

            rm -rf deploy
            mv release/deploy deploy
            cp release/prometheus.yml prometheus.yml
            rm -rf scripts
            mv release/scripts scripts
            rm -rf release

      - name: Encode Swarm environment
        shell: bash
        env:
          SWARM_ENV_CONTENT: ${{ secrets.SWARM_ENV }}
        run: |
          set -euo pipefail

          SWARM_ENV_BASE64="$(printf '%s' "$SWARM_ENV_CONTENT" | base64 --wrap=0)"
          echo "::add-mask::$SWARM_ENV_BASE64"
          printf 'SWARM_ENV_BASE64=%s\n' "$SWARM_ENV_BASE64" >> "$GITHUB_ENV"

      - name: Deploy stack
        uses: appleboy/ssh-action@v1.2.5
        env:
          SWARM_ENV_BASE64: ${{ env.SWARM_ENV_BASE64 }}
        with:
          host: ${{ secrets.SWARM_LEADER_HOST }}
          username: ${{ secrets.SWARM_SSH_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          envs: SWARM_ENV_BASE64
          script: |
            set -euo pipefail

            cd '${{ env.SWARM_PATH }}'

            if [ -z "${SWARM_ENV_BASE64:-}" ]; then
              echo "SWARM_ENV is empty."
              exit 1
            fi

            printf '%s' "$SWARM_ENV_BASE64" | base64 --decode > .env
            chmod 600 .env

            set -a
            . ./.env
            set +a

            export STACK_NAME='${{ env.STACK_NAME }}'
            export ARTIFACT_REGISTRY_HOST='${{ secrets.ARTIFACT_REGISTRY_HOST }}'
            export ARTIFACT_REGISTRY_USERNAME='${{ secrets.ARTIFACT_REGISTRY_USERNAME }}'
            export ARTIFACT_REGISTRY_PASSWORD='${{ secrets.ARTIFACT_REGISTRY_PASSWORD }}'
            export IMAGE_TAG='${{ github.sha }}'
            export DEPLOY_RUN_ID='${{ github.run_id }}-${{ github.run_attempt }}'
            export CLOUD_RU_SECRET_PROJECT_ID='${{ vars.CLOUD_RU_SECRET_PROJECT_ID }}'
            export CLOUD_RU_SECRET_PREFIX='${{ vars.CLOUD_RU_SECRET_PREFIX || '/appsettings' }}'
            export CLOUD_RU_SECRET_DEPTH='${{ vars.CLOUD_RU_SECRET_DEPTH || '-1' }}'
            export CLOUD_RU_SECRET_NAMES='${{ vars.CLOUD_RU_SECRET_NAMES }}'
            export CLOUD_RU_SECRET_VERSION='${{ vars.CLOUD_RU_SECRET_VERSION }}'
            export DOTNET_ENVIRONMENT='${{ env.DEPLOY_ENVIRONMENT }}'
            export ASPNETCORE_ENVIRONMENT='${{ env.DEPLOY_ENVIRONMENT }}'
            export CONFIGS_PATH="${CONFIGS_PATH:-${{ env.SWARM_PATH }}/configs}"
            export PUBLIC_NETWORK="${PUBLIC_NETWORK:-public}"
            export BACKEND_NETWORK="${BACKEND_NETWORK:-backend}"
            export MONITORING_NETWORK="${MONITORING_NETWORK:-monitoring}"
            export VOLUME_PREFIX="${VOLUME_PREFIX:-${STACK_NAME}}"
            export MAIN_API_REPLICAS="${MAIN_API_REPLICAS:-1}"
            export SEARCH_API_REPLICAS="${SEARCH_API_REPLICAS:-1}"
            export PRICING_API_REPLICAS="${PRICING_API_REPLICAS:-1}"
            export ANALYTICS_API_REPLICAS="${ANALYTICS_API_REPLICAS:-1}"
            export MAIN_WORKER_REPLICAS="${MAIN_WORKER_REPLICAS:-1}"
            export PRICING_WORKER_REPLICAS="${PRICING_WORKER_REPLICAS:-1}"
            export ANALYTICS_WORKER_REPLICAS="${ANALYTICS_WORKER_REPLICAS:-1}"
            export MIGRATE_LEGACY_STACK="${MIGRATE_LEGACY_STACK:-true}"
            export DOCKER_CONFIG="${{ env.SWARM_PATH }}/.docker"

            bash scripts/deploy/deploy-swarm.sh
