name: Deploy

on:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      CLOUD_RU_SECRET_PREFIX: ${{ secrets.CLOUD_RU_SECRET_PREFIX || '/appsettings' }}
      CLOUD_RU_CONFIGS_OUT: ./configs
      CLOUD_RU_SECRET_DEPTH: ${{ secrets.CLOUD_RU_SECRET_DEPTH || '-1' }}
      SWARM_PATH: ${{ secrets.SWARM_PATH || '/opt/ecommerce' }}
      STACK_NAME: ${{ secrets.SWARM_STACK_NAME || 'ecommerce' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load Cloud.ru configs
        env:
          CLOUD_RU_KEY_ID: ${{ secrets.ARTIFACT_REGISTRY_USERNAME }}
          CLOUD_RU_KEY_SECRET: ${{ secrets.ARTIFACT_REGISTRY_PASSWORD }}
          CLOUD_RU_SECRET_PROJECT_ID: ${{ secrets.CLOUD_RU_SECRET_PROJECT_ID }}
          CLOUD_RU_SECRET_NAMES: ${{ secrets.CLOUD_RU_SECRET_NAMES }}
          CLOUD_RU_SECRET_VERSION: ${{ secrets.CLOUD_RU_SECRET_VERSION }}
        run: python scripts/deploy/load-secrets.py

      - name: Prepare deploy payload
        run: |
          mkdir -p deploy-payload/configs deploy-payload/init deploy-payload/scripts/deploy

          cp compose.stack.yaml deploy-payload/compose.stack.yaml
          cp compose.stack.database.yaml deploy-payload/compose.stack.database.yaml
          cp prometheus.yml deploy-payload/prometheus.yml
          cp scripts/deploy/deploy-swarm.sh deploy-payload/scripts/deploy/deploy-swarm.sh
          cp -R configs/. deploy-payload/configs/
          cp -R init/. deploy-payload/init/

      - name: Prepare leader directory
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SWARM_LEADER_HOST }}
          username: ${{ secrets.SWARM_SSH_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          script: |
            set -e

            mkdir -p '${{ env.SWARM_PATH }}'
            cd '${{ env.SWARM_PATH }}'

            rm -rf configs init
            mkdir -p configs init certs

      - name: Upload stack files to leader
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SWARM_LEADER_HOST }}
          username: ${{ secrets.SWARM_SSH_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          source: "deploy-payload/*"
          target: ${{ env.SWARM_PATH }}
          strip_components: 1
          overwrite: true

      - name: Upload shared configs to worker nodes
        env:
          SWARM_WORKER_HOSTS: ${{ secrets.SWARM_WORKER_HOSTS }}
          SWARM_SSH_USER: ${{ secrets.SWARM_SSH_USER }}
          SWARM_SSH_KEY: ${{ secrets.SWARM_SSH_KEY }}
          SWARM_PATH: ${{ env.SWARM_PATH }}
        run: bash scripts/deploy/upload-swarm-shared-files.sh

      - name: Deploy stack
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SWARM_LEADER_HOST }}
          username: ${{ secrets.SWARM_SSH_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          script: |
            set -e

            cd '${{ env.SWARM_PATH }}'

            printf '%s\n' '${{ secrets.SWARM_ENV }}' > .env
            chmod 600 .env

            set -a
            . ./.env
            set +a

            export STACK_NAME='${{ env.STACK_NAME }}'
            export ARTIFACT_REGISTRY_HOST='${{ secrets.ARTIFACT_REGISTRY_HOST }}'
            export ARTIFACT_REGISTRY_USERNAME='${{ secrets.ARTIFACT_REGISTRY_USERNAME }}'
            export ARTIFACT_REGISTRY_PASSWORD='${{ secrets.ARTIFACT_REGISTRY_PASSWORD }}'
            export IMAGE_TAG='${{ github.sha }}'
            export DEPLOY_RUN_ID='${{ github.run_id }}'
            export DOTNET_ENVIRONMENT='Staging'
            export ASPNETCORE_ENVIRONMENT='Staging'
            export CONFIGS_PATH='${{ env.SWARM_PATH }}/configs'
            export CERTS_PATH='${{ env.SWARM_PATH }}/certs'
            export INIT_PATH='${{ env.SWARM_PATH }}/init'
            export PROMETHEUS_CONFIG_PATH='${{ env.SWARM_PATH }}/prometheus.yml'
            export TRAEFIK_NETWORK="${TRAEFIK_NETWORK:-${STACK_NAME}_backend-network}"
            export MAIN_API_REPLICAS="${MAIN_API_REPLICAS:-1}"
            export SEARCH_API_REPLICAS="${SEARCH_API_REPLICAS:-1}"
            export PRICING_API_REPLICAS="${PRICING_API_REPLICAS:-1}"
            export ANALYTICS_API_REPLICAS="${ANALYTICS_API_REPLICAS:-1}"
            export ANALYTICS_WORKER_REPLICAS="${ANALYTICS_WORKER_REPLICAS:-1}"
            export DOCKER_CONFIG="${{ env.SWARM_PATH }}/.docker"

            bash scripts/deploy/deploy-swarm.sh
