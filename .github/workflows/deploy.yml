name: Deploy

on:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Copy all files except /src
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" > key.pem
          chmod 600 key.pem

          rsync -avz \
            --exclude 'src/' \
            --exclude '.git/' \
            -e "ssh -i key.pem -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd ${{ secrets.VPS_PATH }}

            export ARTIFACT_REGISTRY_HOST='${{ secrets.ARTIFACT_REGISTRY_HOST }}'
            export IMAGE_TAG='${{ github.sha }}'
            export DOTNET_ENVIRONMENT='Staging'
            export ASPNETCORE_ENVIRONMENT='Staging'

            echo '${{ secrets.ARTIFACT_REGISTRY_PASSWORD }}' | docker login \
              '${{ secrets.ARTIFACT_REGISTRY_HOST }}' \
              --username '${{ secrets.ARTIFACT_REGISTRY_USERNAME }}' \
              --password-stdin

            docker compose -f compose.yaml -f compose.registry.yaml down
            docker compose -f compose.yaml -f compose.registry.yaml up pgql -d

            echo "=== Pull migrator images ==="
            docker compose -f migrator-compose.yaml -f migrator-compose.registry.yaml pull

            echo "=== Start pgql container ==="
            docker compose -f compose.yaml -f compose.registry.yaml up pgql -d --no-build

            echo "=== Run migrators ==="
            docker compose -f migrator-compose.yaml -f migrator-compose.registry.yaml up --no-build

            echo "=== Pull app images ==="
            docker compose -f compose.yaml -f compose.registry.yaml pull

            echo "=== Restart app ==="
            docker compose -f compose.yaml -f compose.registry.yaml up -d --no-build

            echo "=== Done ==="
