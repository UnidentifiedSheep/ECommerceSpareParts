services:
  main.api:
    image: main.api
    build:
      context: .
      dockerfile: src/Services/Main/Main.Api/Dockerfile
    expose:
      - "8080"
    volumes:
      - ${CONFIGS_PATH:-./certs}:/app/configs:ro
    environment:
      - DOTNET_ENVIRONMENT=${DOTNET_ENVIRONMENT:-Development}
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
    networks:
      - backend-network
    depends_on:
      - pgql
      - redis
      - rabbitmq
    restart: unless-stopped

  search.api:
    image: search.api
    build:
      context: .
      dockerfile: src/Services/Search/Search.Api/Dockerfile
    expose:
      - "8080"
    volumes:
      - ./search_api_data:/app/data
      - ${CONFIGS_PATH:-./certs}:/app/configs:ro
    environment:
      - DOTNET_ENVIRONMENT=${DOTNET_ENVIRONMENT:-Development}
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
    networks:
      - backend-network

  pricing.api:
    image: pricing.api
    build:
      context: .
      dockerfile: src/Services/Pricing/Pricing.Api/Dockerfile
    expose:
      - "8080"
    volumes:
      - ${CONFIGS_PATH:-./certs}:/app/configs:ro
    environment:
      - DOTNET_ENVIRONMENT=${DOTNET_ENVIRONMENT:-Development}
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
    networks:
      - backend-network
    depends_on:
      - pgql
      - redis
      - rabbitmq
    restart: unless-stopped

  gateway:
    image: gateway
    build:
      context: .
      dockerfile: src/Services/Gateway/Gateway/Dockerfile
    ports:
      - "443:7292"
    volumes:
      - ${CERTS_PATH:-./certs}:/app/certs:ro
      - ${CONFIGS_PATH:-./certs}:/app/configs:ro
    environment:
      - DOTNET_ENVIRONMENT=${DOTNET_ENVIRONMENT:-Development}
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
    networks:
      - backend-network
    restart: unless-stopped

  analytics.api:
    image: analytics.api
    build:
      context: .
      dockerfile: src/Services/Analytics/Analytics.Api/Dockerfile
    expose:
      - "8080"
    volumes:
      - ${CONFIGS_PATH:-./certs}:/app/configs:ro
    environment:
      - DOTNET_ENVIRONMENT=${DOTNET_ENVIRONMENT:-Development}
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
    networks:
      - backend-network
    depends_on:
      - pgql
      - redis
      - rabbitmq
    restart: unless-stopped
  
  analytics.worker:
    image: analytics.worker
    build:
      context: .
      dockerfile: src/Services/Analytics/Analytics.Worker/Dockerfile
    volumes:
      - ${CONFIGS_PATH:-./certs}:/app/configs:ro
    environment:
      - DOTNET_ENVIRONMENT=${DOTNET_ENVIRONMENT:-Development}
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
    networks:
      - backend-network
    depends_on:
      - pgql
      - redis
      - rabbitmq
    restart: unless-stopped

  pgql:
    image: postgres-cron
    build:
      context: .
      dockerfile: .dockerfiles/pgql-cron/Dockerfile
    environment:
      POSTGRES_USER: ${PGQL_USER}
      POSTGRES_PASSWORD: ${PGQL_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: main,analytics,pricing
    volumes:
      - pg_data:/var/lib/postgresql
      - ./init:/docker-entrypoint-initdb.d
      - ./init:/clear-expired-coef.sql
    command: >
      postgres
      -c shared_preload_libraries=pg_cron
      -c cron.database_name=postgres
    networks:
      - backend-network
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis/redis-stack:latest
    command:
      - redis-stack-server
      - --maxmemory-policy
      - allkeys-lru
      - --active-expire-effort
      - "10"
      - --requirepass
      - ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - backend-network
    ports:
      - "6379:6379"
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "15672:15672"
      - "5672:5672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend-network
    restart: unless-stopped

  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: >
      server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - backend-network

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb -p local/${MINIO_IMAGES_BUCKET};
      mc anonymous set public local/${MINIO_IMAGES_BUCKET};
      mc ${MINIO_ROOT_USER} user add local ${MINIO_SERVICE_USER} ${MINIO_SERVICE_PASSWORD};
      mc ${MINIO_ROOT_USER} policy attach local readwrite --user ${MINIO_SERVICE_USER};
      exit 0;
      "
    networks:
      - backend-network

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - backend-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090"
    networks:
      - backend-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ${CERTS_PATH:-./certs}:/app/certs:ro
    environment:
      - GF_SERVER_PROTOCOL=https
      - GF_SERVER_CERT_FILE=${CERT_PATH}
      - GF_SERVER_CERT_KEY=${CERT_KEYPATH}
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - backend-network
    depends_on:
      - loki
      - prometheus
    restart: unless-stopped



networks:
  backend-network:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  grafana_data:
