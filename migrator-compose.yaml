services:
  analytics.migrator:
    image: analytics.migrator
    build:
      context: .
      dockerfile: src/Services/Analytics/Analytics.Migrator/Dockerfile
    environment:
      - ConnectionString=Host=${PGQL_HOST};Port=5432;Database=analytics;Username=${PGQL_USER};Password=${PGQL_PASSWORD}
    networks:
      - backend-network
    
  main.migrator:
    image: main.migrator
    build:
      context: .
      dockerfile: src/Services/Main/Main.Migrator/Dockerfile
    environment:
      - ConnectionString=Host=${PGQL_HOST};Port=5432;Database=main;Username=${PGQL_USER};Password=${PGQL_PASSWORD}
    networks:
      - backend-network
    
  pricing.migrator:
    image: pricing.migrator
    build:
      context: .
      dockerfile: src/Services/Pricing/Pricing.Migrator/Dockerfile
    environment:
      - ConnectionString=Host=${PGQL_HOST};Port=5432;Database=pricing;Username=${PGQL_USER};Password=${PGQL_PASSWORD}
    networks:
      - backend-network

networks:
  backend-network:
    external: true
    name: ecommercespareparts_backend-network