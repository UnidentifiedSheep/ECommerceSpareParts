services:
  analytics.migrator:
    image: analytics.migrator
    build:
      context: .
      dockerfile: src/Services/Analytics/Analytics.Migrator/Dockerfile
    environment:
      - ConnectionString=Host=host.docker.internal;Port=5432;Database=analytics;Username=${PGQL_USER};Password=${PGQL_PASSWORD}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    
  main.migrator:
    image: main.migrator
    build:
      context: .
      dockerfile: src/Services/Main/Main.Migrator/Dockerfile
    environment:
      - ConnectionString=Host=host.docker.internal;Port=5432;Database=main;Username=${PGQL_USER};Password=${PGQL_PASSWORD}
      - Seed=${MAIN_SEED}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    
  pricing.migrator:
    image: pricing.migrator
    build:
      context: .
      dockerfile: src/Services/Pricing/Pricing.Migrator/Dockerfile
    environment:
      - ConnectionString=Host=host.docker.internal;Port=5432;Database=pricing;Username=${PGQL_USER};Password=${PGQL_PASSWORD}
    extra_hosts:
      - "host.docker.internal:host-gateway"