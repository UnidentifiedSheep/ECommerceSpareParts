services:
  pgql:
    image: ${ARTIFACT_REGISTRY_HOST}/postgres-cron:${IMAGE_TAG}
    environment:
      POSTGRES_USER: ${PGQL_USER}
      POSTGRES_PASSWORD: ${PGQL_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: main,analytics,pricing
    volumes:
      - pg_data:/var/lib/postgresql
      - ${INIT_PATH:-/opt/ecommerce/init}:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
      -c shared_preload_libraries=pg_cron
      -c cron.database_name=postgres
    networks:
      - backend-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == infra
      labels:
        - traefik.enable=true
        - traefik.tcp.routers.pgql.rule=HostSNI(`*`)
        - traefik.tcp.routers.pgql.entrypoints=postgres
        - traefik.tcp.services.pgql.loadbalancer.server.port=5432
      restart_policy:
        condition: any

networks:
  backend-network:
    name: ${TRAEFIK_NETWORK:-ecommerce_backend-network}
    driver: overlay
    attachable: true

volumes:
  pg_data:
