services:
  secrets-sync:
    image: python:3.13-slim

    configs:
      - source: cloudru_secrets_script
        target: /scripts/fetch-secrets.py
        mode: 0555

    secrets:
      - cloudru_key_id
      - cloudru_key_secret

    environment:
      CLOUD_RU_SECRET_PROJECT_ID: ${CLOUD_RU_SECRET_PROJECT_ID}
      CLOUD_RU_SECRET_PREFIX: ${CLOUD_RU_SECRET_PREFIX:-/appsettings}
      CLOUD_RU_SECRET_DEPTH: ${CLOUD_RU_SECRET_DEPTH:--1}
      CLOUD_RU_SECRET_NAMES: ${CLOUD_RU_SECRET_NAMES:-}
      CLOUD_RU_SECRET_VERSION: ${CLOUD_RU_SECRET_VERSION:-}
      CLOUD_RU_CONFIGS_OUT: /output/.next
      DEPLOY_RUN_ID: ${DEPLOY_RUN_ID:?DEPLOY_RUN_ID is required}

    command:
      - sh
      - -c
      - |
        set -eu
        rm -rf /output/.next
        mkdir -p /output/.next
        export CLOUD_RU_KEY_ID="$$(cat /run/secrets/cloudru_key_id)"
        export CLOUD_RU_KEY_SECRET="$$(cat /run/secrets/cloudru_key_secret)"
        if ! python /scripts/fetch-secrets.py >/tmp/cloudru-sync.log 2>&1; then
          rm -f /tmp/cloudru-sync.log
          echo "Cloud.ru secrets sync failed. Sensitive loader output was suppressed." >&2
          exit 1
        fi
        rm -f /tmp/cloudru-sync.log
        if ! find /output/.next -type f -name '*.json' -print -quit | grep -q .; then
          echo "Cloud.ru sync produced no JSON config files." >&2
          exit 1
        fi
        find /output -mindepth 1 -maxdepth 1 ! -name .next -exec rm -rf {} +
        cp -a /output/.next/. /output/
        rm -rf /output/.next

    volumes:
      - ${CONFIGS_PATH:-/opt/ecommerce/configs}:/output

    networks:
      - backend

    deploy:
      mode: global
      placement:
        constraints:
          - node.labels.secrets.sync != false

      update_config:
        parallelism: 0
        order: stop-first

      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 1

configs:
  cloudru_secrets_script:
    external: true
    name: ${CLOUDRU_SECRETS_SCRIPT_CONFIG:?CLOUDRU_SECRETS_SCRIPT_CONFIG is required}

secrets:
  cloudru_key_id:
    external: true

  cloudru_key_secret:
    external: true

networks:
  backend:
    name: ${BACKEND_NETWORK:-backend}
    external: true
