services:
  traefik:
    image: traefik:v3.6
    command:
      - --providers.swarm=true
      - --providers.swarm.exposedbydefault=false
      - --providers.swarm.network=${PUBLIC_NETWORK:-public}
      - --ping=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL:?TRAEFIK_ACME_EMAIL is required}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      public:
        aliases:
          - traefik
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
          - node.labels.workload.traefik == true
      restart_policy:
        condition: any
        delay: 5s

  gateway:
    image: ${ARTIFACT_REGISTRY_HOST}/gateway:${IMAGE_TAG}
    volumes:
      - ${CONFIGS_PATH:-/opt/ecommerce/configs}:/app/configs:ro
    environment:
      - DOTNET_ENVIRONMENT=${DOTNET_ENVIRONMENT:-Staging}
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Staging}
      - DEPLOY_RUN_ID=${DEPLOY_RUN_ID:-local}
    networks:
      public:
        aliases:
          - gateway
      backend:
        aliases:
          - gateway
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.workload.gateway == true
      labels:
        - traefik.enable=true
        - traefik.swarm.network=${PUBLIC_NETWORK:-public}
        - traefik.http.routers.gateway.rule=Host(`${GATEWAY_HOST:?GATEWAY_HOST is required}`)
        - traefik.http.routers.gateway.entrypoints=websecure
        - traefik.http.routers.gateway.tls.certresolver=letsencrypt
        - traefik.http.services.gateway.loadbalancer.server.port=8080
      update_config:
        parallelism: 1
        order: start-first
      restart_policy:
        condition: any
        delay: 5s

  portainer-agent:
    image: portainer/agent:lts
    environment:
      AGENT_CLUSTER_ADDR: tasks.portainer-agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    networks:
      - portainer-agent
    deploy:
      mode: global
      placement:
        constraints:
          - node.platform.os == linux
      restart_policy:
        condition: any
        delay: 5s

  portainer:
    image: portainer/portainer-ce:lts
    command:
      - -H
      - tcp://tasks.portainer-agent:9001
      - --tlsskipverify
    volumes:
      - portainer_data:/data
    networks:
      public:
        aliases:
          - portainer
      portainer-agent:
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
          - node.labels.management.portainer == true
      labels:
        - traefik.enable=true
        - traefik.swarm.network=${PUBLIC_NETWORK:-public}
        - traefik.http.routers.portainer.rule=Host(`${PORTAINER_HOST:?PORTAINER_HOST is required}`)
        - traefik.http.routers.portainer.entrypoints=websecure
        - traefik.http.routers.portainer.tls.certresolver=letsencrypt
        - traefik.http.services.portainer.loadbalancer.server.port=9000
        - traefik.http.services.portainer.loadbalancer.server.scheme=http
      update_config:
        parallelism: 1
        order: stop-first
      restart_policy:
        condition: any
        delay: 5s

networks:
  public:
    name: ${PUBLIC_NETWORK:-public}
    external: true
  backend:
    name: ${BACKEND_NETWORK:-backend}
    external: true
  portainer-agent:
    name: ${STACK_NAME:-ecommerce}-gateway-portainer-agent
    driver: overlay
    attachable: true
    driver_opts:
      encrypted: "true"

volumes:
  traefik_letsencrypt:
    name: ${VOLUME_PREFIX:-ecommerce}_traefik_letsencrypt
    external: true
  portainer_data:
    name: ${VOLUME_PREFIX:-ecommerce}_portainer_data
    external: true
